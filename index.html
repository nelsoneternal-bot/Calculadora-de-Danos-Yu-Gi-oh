<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Calculadora de Danos Yu-Gi-oh</title>
</body>
</head>
<body>
<div class="main-wrapper">
    <!-- Displays de Vida -->
   <div class="displays">
    <div class="life-box active" id="p1" onclick="selectPlayer(1)">
        <input type="text" value="ME" class="player-name-input">
        <div class="life-val" id="life1">8000</div>
    </div>

    <div class="life-box" id="p2" onclick="selectPlayer(2)">
        <input type="text" value="YOU" class="player-name-input">
        <div class="life-val" id="life2">8000</div>
    </div>
</div>

    <!-- Painel de Ações Estilo Calculadora -->
    <div class="control-panel">
    <div class="row">
        <button class="btn-red" onclick="modifyLife(-100)">-100</button>
        <button class="btn-red" onclick="modifyLife(-1000)">-1000</button>
        <button class="btn-green" onclick="modifyLife(100)">+100</button>
        <button class="btn-green" onclick="modifyLife(1000)">+1000</button>
    </div>
    
    <div class="row">
        <input type="number" id="customVal" placeholder="Valor">
        <button onclick="modifyCustom(-1)">- Valor</button>
        <button onclick="modifyCustom(1)">+ Valor</button>
    </div>

    <div class="row">
        <button class="calc-btn" onclick="openCalc()">Calculadora Avançada</button>
    </div>
</div>
</div>
</html>
